services:
  postgres:
    image: postgres:16
    container_name: autovhc-postgres
    environment:
      POSTGRES_DB: autovhc_prototype
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - autovhc_pgdata:/var/lib/postgresql/data

volumes:
  autovhc_pgdata:
